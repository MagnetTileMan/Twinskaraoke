name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive iPhone
        run: |
          xcodebuild archive \
            -project Twinskaraoke.xcodeproj \
            -scheme "Twinskaraoke" \
            -archivePath build/iPhone.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package iPhone IPA
        run: |
          mkdir -p build/iPhone_IPA/Payload
          cp -R build/iPhone.xcarchive/Products/Applications/*.app build/iPhone_IPA/Payload/
          cd build/iPhone_IPA && zip -r Twinskaraoke-iPhone.ipa Payload

      - name: Upload iPhone IPA
        uses: actions/upload-artifact@v4
        with:
          name: Twinskaraoke-iPhone
          path: build/iPhone_IPA/Twinskaraoke-iPhone.ipa

      - name: Archive Watch
        run: |
          xcodebuild archive \
            -project Twinskaraoke.xcodeproj \
            -scheme "Twinskaraoke Watch App" \
            -archivePath build/Watch.xcarchive \
            -destination "generic/platform=watchOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package Watch IPA
        run: |
          mkdir -p build/Watch_IPA/Payload
          cp -R build/Watch.xcarchive/Products/Applications/*.app build/Watch_IPA/Payload/
          cd build/Watch_IPA && zip -r Twinskaraoke-Watch.ipa Payload

      - name: Upload Watch IPA
        uses: actions/upload-artifact@v4
        with:
          name: Twinskaraoke-Watch
          path: build/Watch_IPA/Twinskaraoke-Watch.ipa
